<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --light-sky: #e1f5fe;
        }

        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--light-sky) 100%); 
            color: #333; 
            overflow-x: hidden;
        }

        /* Ad Slots - Updated for better image display */
        .ad-box { position: fixed; background: #f0f4f7; overflow: hidden; z-index: 5; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .ad-top { top: 5px; width: 95%; height: 60px; left: 2.5%; }
        .ad-bottom { bottom: 5px; width: 95%; height: 60px; left: 2.5%; }
        .ad-side { width: 140px; height: 500px; top: 50%; transform: translateY(-50%); }
        .ad-left { left: 15px; }
        .ad-right { right: 15px; }
        @media (max-width: 1150px) { .ad-side { display: none; } }

        /* Interstitial Ad Overlay */
        #interstitial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .container { 
            background: white; 
            width: 90%; 
            max-width: 500px; 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            position: relative; 
            z-index: 10;
            border: 5px solid white;
        }

        .ad-img { width: 100%; height: 100%; object-fit: contain; cursor: pointer; transition: 0.3s; }
        .ad-img:hover { opacity: 0.9; }

        #qText {
            font-weight: bold; 
            font-size: 1.3em;
            background: var(--light-sky);
            padding: 25px;
            border-radius: 15px;
            color: var(--primary);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 12px; 
            font-size: 1.1em;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover { background: #253a8e; transform: translateY(-2px); }

        .opt-btn {
            background: #ffffff;
            color: #333;
            text-align: left;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
        }

        .opt-btn:hover {
            background: var(--light-sky);
            border-color: var(--primary);
        }

        .label-box {
            background: var(--primary);
            color: white;
            min-width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            margin-right: 15px;
            font-size: 0.9em;
        }

        .hidden { display: none; }
        input {
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 2px solid #eee;
            font-size: 1em;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="ad-box ad-top" id="slot-top"></div>
    <div class="ad-box ad-bottom" id="slot-bottom"></div>
    <div class="ad-box ad-side ad-left" id="slot-left"></div>
    <div class="ad-box ad-side ad-right" id="slot-right"></div>

    <div id="interstitial-overlay">
        <p id="timer-text" style="color:white; font-size:1.2em; font-weight:bold;">ውጤትዎ እየተዘጋጀ ነው... (3)</p>
        <div id="interstitial-content" style="width:85%; max-width:320px; height:450px; margin-top:15px; border-radius:15px; overflow:hidden; background: white;"></div>
    </div>

    <div class="container">
        <h1 style="color:var(--primary); margin:0; font-size: 2.8em; letter-spacing: 2px;">ቃሉ!</h1>
        <div id="step-reg">
            <p style="color: #666; margin-bottom: 25px; font-size: 1.1em;">የመጽሐፍ ቅዱስ እውቀት መፈተኛ</p>
            <input type="text" id="uName" placeholder="ሙሉ ስም">
            <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
            <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
        </div>

        <div id="step-quiz" class="hidden">
            <p id="qText"></p>
            <div id="options-container"></div>
        </div>

        <div id="step-res" class="hidden">
            <h2 style="color:var(--primary);">እንኳን ደስ አለዎት!</h2>
            <p>የእርስዎ ውጤት፡</p>
            <div style="font-size: 4.5em; font-weight:900; color: var(--accent); margin: 20px 0;"><span id="finalScore">0</span>%</div>
            <button class="btn" onclick="location.reload()">እንደገና ተጫወት</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc",
        authDomain: "biblicallanguagequizbot.firebaseapp.com",
        projectId: "biblicallanguagequizbot",
        storageBucket: "biblicallanguagequizbot.firebasestorage.app",
        messagingSenderId: "1040255793336",
        appId: "1:1040255793336:web:83444c54330769d257dc4d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], adsList = [], interstitialData = null;
    let idx = 0, score = 0;

    async function startApp() {
        const name = document.getElementById('uName').value;
        if(!name) return alert("እባክዎ ስምዎን ያስገቡ!");

        try {
            const configSnap = await db.collection("ads").doc("config").get();
            if(configSnap.exists) adsList = configSnap.data().list;

            const intSnap = await db.collection("ads").doc("interstitial").get();
            if(intSnap.exists) interstitialData = intSnap.data();

            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => qPool.push(doc.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 5);

            document.getElementById('step-reg').classList.add('hidden');
            showQ();
        } catch(e) { console.log(e); alert("መረጃ መጫን አልተቻለም።"); }
    }

    function updateAds() {
        if(!adsList || adsList.length === 0) return;
        const slots = ['slot-top', 'slot-bottom', 'slot-left', 'slot-right'];
        
        slots.forEach(slotId => {
            const randomAd = adsList[Math.floor(Math.random() * adsList.length)];
            const slot = document.getElementById(slotId);
            
            if(!randomAd.link || randomAd.link.trim() === "") {
                slot.innerHTML = `<img src="${randomAd.img}" class="ad-img" style="cursor:default;">`;
            } else {
                slot.innerHTML = `<a href="${randomAd.link}" target="_blank"><img src="${randomAd.img}" class="ad-img"></a>`;
            }
        });
    }

    function showQ() {
        updateAds();
        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('qText').innerText = q.text;
        
        let html = '';
        const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            html += `
                <button class="btn opt-btn" onclick="submitAns('${String.fromCharCode(65+i)}')">
                    <div class="label-box">${labels[i]}</div>
                    <span>${opt}</span>
                </button>`;
        });
        document.getElementById('options-container').innerHTML = html;
    }

    function submitAns(ans) {
        if(ans === qPool[idx].correct) score++;
        idx++;
        if(idx < qPool.length) showQ(); else showInterstitial();
    }

    function showInterstitial() {
        document.getElementById('step-quiz').classList.add('hidden');
        if(!interstitialData) return finish();

        const overlay = document.getElementById('interstitial-overlay');
        overlay.style.display = 'flex';
        
        let contentHtml = "";
        if(!interstitialData.link || interstitialData.link.trim() === "") {
            contentHtml = `<img src="${interstitialData.img}" style="width:100%; height:100%; object-fit:contain;">`;
        } else {
            contentHtml = `<a href="${interstitialData.link}" target="_blank"><img src="${interstitialData.img}" style="width:100%; height:100%; object-fit:contain;"></a>`;
        }
        document.getElementById('interstitial-content').innerHTML = contentHtml;

        let timeLeft = 3;
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `ውጤትዎ እየተዘጋጀ ነው... (${timeLeft})`;
            if(timeLeft <= 0) {
                clearInterval(timer);
                overlay.style.display = 'none';
                finish();
            }
        }, 1000);
    }

    function finish() {
        document.getElementById('finalScore').innerText = Math.round((score/qPool.length)*100);
        document.getElementById('step-res').classList.remove('hidden');
    }
</script>
</body>
</html>

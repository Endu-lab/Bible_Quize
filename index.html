<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --light-sky: #e1f5fe;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--light-sky) 100%); 
            color: #333; overflow-x: hidden;
        }

        /* Ad Slots */
        .ad-box { position: fixed; background: #f0f4f7; overflow: hidden; z-index: 5; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .ad-top { top: 5px; width: 95%; height: 60px; left: 2.5%; }
        .ad-bottom { bottom: 5px; width: 95%; height: 60px; left: 2.5%; }
        .ad-side { width: 140px; height: 500px; top: 50%; transform: translateY(-50%); }
        .ad-left { left: 15px; }
        .ad-right { right: 15px; }
        @media (max-width: 1150px) { .ad-side { display: none; } }

        .container { 
            background: white; width: 90%; max-width: 500px; 
            padding: 35px; border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            text-align: center; position: relative; z-index: 10;
            border: 5px solid white;
        }

        .ad-media { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.3s; }

        #qText {
            font-weight: bold; font-size: 1.3em; background: var(--light-sky);
            padding: 25px; border-radius: 15px; color: var(--primary);
            margin-bottom: 25px; line-height: 1.6;
        }

        .btn { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; margin-top: 12px; 
            font-size: 1.1em; transition: 0.2s;
        }

        .btn:hover { background: #253a8e; transform: translateY(-2px); }

        .opt-btn {
            background: #ffffff; color: #333; text-align: left;
            border: 2px solid #e0e0e0; display: flex; align-items: center;
        }

        .label-box {
            background: var(--primary); color: white; min-width: 30px;
            height: 30px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; margin-right: 15px;
        }

        #interstitial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #eee; outline: none; }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>

    <div class="ad-box ad-top" id="slot-top"></div>
    <div class="ad-box ad-bottom" id="slot-bottom"></div>
    <div class="ad-box ad-side ad-left" id="slot-left"></div>
    <div class="ad-box ad-side ad-right" id="slot-right"></div>

    <div id="interstitial-overlay">
        <p id="timer-text" style="color:white; font-size:1.2em; font-weight:bold;">ውጤትዎ እየተዘጋጀ ነው... (3)</p>
        <div id="interstitial-content" style="width:85%; max-width:320px; height:450px; margin-top:15px; border-radius:15px; overflow:hidden; background: white;"></div>
    </div>

    <div class="container">
        <h1 style="color:var(--primary); margin:0; font-size: 2.8em;">ቃሉ!</h1>
        <div id="step-reg">
            <input type="text" id="uName" placeholder="ሙሉ ስም">
            <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
            <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
        </div>

        <div id="step-quiz" class="hidden">
            <p id="qText"></p>
            <div id="options-container"></div>
        </div>

        <div id="step-res" class="hidden">
            <h2 style="color:var(--primary);">እንኳን ደስ አለዎት!</h2>
            <div style="font-size: 4.5em; font-weight:900; color: var(--accent); margin: 20px 0;"><span id="finalScore">0</span>%</div>
            <button class="btn" onclick="location.reload()">እንደገና ተጫወት</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc",
        authDomain: "biblicallanguagequizbot.firebaseapp.com",
        projectId: "biblicallanguagequizbot",
        storageBucket: "biblicallanguagequizbot.firebasestorage.app",
        messagingSenderId: "1040255793336",
        appId: "1:1040255793336:web:83444c54330769d257dc4d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], adsList = [], interstitialData = null;
    let idx = 0, score = 0;

    async function startApp() {
        const name = document.getElementById('uName').value;
        if(!name) return alert("እባክዎ ስምዎን ያስገቡ!");
        try {
            const configSnap = await db.collection("ads").doc("config").get();
            if(configSnap.exists) adsList = configSnap.data().list;
            const intSnap = await db.collection("ads").doc("interstitial").get();
            if(intSnap.exists) interstitialData = intSnap.data();
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => qPool.push(doc.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 5);
            document.getElementById('step-reg').classList.add('hidden');
            showQ();
        } catch(e) { alert("መረጃ መጫን አልተቻለም!"); }
    }

    function renderMedia(adData) {
        const isVideo = adData.img.toLowerCase().endsWith('.mp4');
        const mediaHtml = isVideo 
            ? `<video src="${adData.img}" autoplay loop muted playsinline class="ad-media"></video>`
            : `<img src="${adData.img}" class="ad-media">`;
        
        return (adData.link && adData.link !== "#") 
            ? `<a href="${adData.link}" target="_blank">${mediaHtml}</a>` 
            : mediaHtml;
    }

    function updateAds() {
        if(!adsList || adsList.length === 0) return;
        ['slot-top', 'slot-bottom', 'slot-left', 'slot-right'].forEach(slotId => {
            const randomAd = adsList[Math.floor(Math.random() * adsList.length)];
            const slot = document.getElementById(slotId);
            if(slot) slot.innerHTML = renderMedia(randomAd);
        });
    }

    function showQ() {
        updateAds();
        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('qText').innerText = q.text;
        let html = '';
        const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            html += `
                <button class="btn opt-btn" onclick="submitAns('${String.fromCharCode(65+i)}')">
                    <div class="label-box">${labels[i]}</div>
                    <span>${opt}</span>
                </button>`;
        });
        document.getElementById('options-container').innerHTML = html;
    }

    function submitAns(ans) {
        const correct = qPool[idx].correct;
        if(ans === correct) {
            score++;
            document.getElementById('snd-correct').play().catch(()=>{});
        } else {
            document.getElementById('snd-wrong').play().catch(()=>{});
        }
        idx++;
        setTimeout(() => {
            if(idx < qPool.length) showQ(); else showInterstitial();
        }, 500);
    }

    function showInterstitial() {
        document.getElementById('step-quiz').classList.add('hidden');
        if(!interstitialData) return finish();
        const overlay = document.getElementById('interstitial-overlay');
        overlay.style.display = 'flex';
        document.getElementById('interstitial-content').innerHTML = renderMedia(interstitialData);

        let timeLeft = 3;
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `ውጤትዎ እየተዘጋጀ ነው... (${timeLeft})`;
            if(timeLeft <= 0) { clearInterval(timer); overlay.style.display = 'none'; finish(); }
        }, 1000);
    }

    function finish() {
        document.getElementById('finalScore').innerText = Math.round((score/qPool.length)*100);
        document.getElementById('step-res').classList.remove('hidden');
    }
</script>
</body>
</html>

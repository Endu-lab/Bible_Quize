<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1a2a6c; --accent: #f39c12; }
        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: #0f2027; color: #333; overflow-x: hidden;
        }

        /* Ad Slots */
        .ad-box { position: fixed; background: #000; overflow: hidden; z-index: 5; border: 1px solid #333; }
        .ad-top { top: 0; width: 100%; height: 55px; left: 0; }
        .ad-bottom { bottom: 0; width: 100%; height: 55px; left: 0; }
        .ad-side { width: 130px; height: 500px; top: 50%; transform: translateY(-50%); }
        .ad-left { left: 10px; }
        .ad-right { right: 10px; }
        @media (max-width: 1000px) { .ad-side { display: none; } }

        /* Interstitial Ad */
        #interstitial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .container { 
            background: white; width: 90%; max-width: 380px; 
            padding: 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            text-align: center; position: relative; z-index: 10;
        }
        .ad-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="ad-box ad-top" id="slot-top"></div>
    <div class="ad-box ad-bottom" id="slot-bottom"></div>
    <div class="ad-box ad-side ad-left" id="slot-left"></div>
    <div class="ad-box ad-side ad-right" id="slot-right"></div>

    <div id="interstitial-overlay">
        <p id="timer-text" style="color:white; font-size:1.1em;">ውጤትዎ እየተዘጋጀ ነው... (3)</p>
        <div id="interstitial-content" style="width:85%; max-width:300px; height:400px; margin-top:15px;"></div>
    </div>

    <div class="container">
        <h1 style="color:var(--primary); margin:0;">ቃል</h1>
        <div id="step-reg">
            <p>የመጽሐፍ ቅዱስ ፈተና</p>
            <input type="text" id="uName" placeholder="ሙሉ ስም" style="width:100%; padding:12px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
            <input type="tel" id="uPhone" placeholder="ስልክ" style="width:100%; padding:12px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;">
            <button class="btn" onclick="startApp()">መፈተን ጀምር</button>
        </div>

        <div id="step-quiz" class="hidden">
            <p id="qText" style="font-weight:bold; font-size:1.1em;"></p>
            <div id="options-container"></div>
        </div>

        <div id="step-res" class="hidden">
            <h2>ውጤት: <span id="finalScore">0</span>%</h2>
            <button class="btn" onclick="location.reload()">እንደገና ተጫወት</button>
        </div>
    </div>

<script>
    // --- ያገኘኸውን መረጃ እዚህ ጋር አስገብቼዋለሁ ---
    const firebaseConfig = {
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc",
        authDomain: "biblicallanguagequizbot.firebaseapp.com",
        projectId: "biblicallanguagequizbot",
        storageBucket: "biblicallanguagequizbot.firebasestorage.app",
        messagingSenderId: "1040255793336",
        appId: "1:1040255793336:web:83444c54330769d257dc4d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], adsList = [], interstitialData = null;
    let idx = 0, score = 0;

    async function startApp() {
        if(!document.getElementById('uName').value) return alert("ስም ያስገቡ!");

        try {
            // 1. ማስታወቂያዎችን ከ Dashboard መጫን
            const configSnap = await db.collection("ads").doc("config").get();
            if(configSnap.exists) adsList = configSnap.data().list;

            const intSnap = await db.collection("ads").doc("interstitial").get();
            if(intSnap.exists) interstitialData = intSnap.data();

            // 2. ጥያቄዎችን መጫን
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => qPool.push(doc.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 5);

            document.getElementById('step-reg').classList.add('hidden');
            showQ();
        } catch(e) { console.log(e); alert("ዳታ መጫን አልተቻለም!"); }
    }

    function updateAds() {
        if(adsList.length === 0) return;
        const slots = ['slot-top', 'slot-bottom', 'slot-left', 'slot-right'];
        slots.forEach(slotId => {
            const randomAd = adsList[Math.floor(Math.random() * adsList.length)];
            document.getElementById(slotId).innerHTML = `
                <a href="${randomAd.link}" target="_blank">
                    <img src="${randomAd.img}" class="ad-img">
                </a>`;
        });
    }

    function showQ() {
        updateAds();
        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('qText').innerText = q.text;
        
        let html = '';
        q.options.forEach((opt, i) => {
            html += `<button class="btn" style="background:#f9f9f9; color:black; border:1px solid #ddd;" onclick="submitAns('${String.fromCharCode(65+i)}')">${opt}</button>`;
        });
        document.getElementById('options-container').innerHTML = html;
    }

    function submitAns(ans) {
        if(ans === qPool[idx].correct) score++;
        idx++;
        if(idx < qPool.length) showQ(); else showInterstitial();
    }

    function showInterstitial() {
        document.getElementById('step-quiz').classList.add('hidden');
        if(!interstitialData) return finish();

        const overlay = document.getElementById('interstitial-overlay');
        overlay.style.display = 'flex';
        document.getElementById('interstitial-content').innerHTML = `
            <a href="${interstitialData.link}" target="_blank">
                <img src="${interstitialData.img}" style="width:100%; height:100%; border-radius:10px; object-fit:cover;">
            </a>`;

        let timeLeft = 3;
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `ውጤትዎ እየተዘጋጀ ነው... (${timeLeft})`;
            if(timeLeft <= 0) {
                clearInterval(timer);
                overlay.style.display = 'none';
                finish();
            }
        }, 1000);
    }

    function finish() {
        document.getElementById('finalScore').innerText = Math.round((score/qPool.length)*100);
        document.getElementById('step-res').classList.remove('hidden');
    }
</script>
</body>
</html>

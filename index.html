<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">

    <meta property="og:title" content="ቃል - የመጽሐፍ ቅዱስ ፈተና">
    <meta property="og:description" content="እውቀትዎን ይፈትሹ! ተሳትፈው ሽልማቶችን ያሸንፉ።">
    <meta property="og:image" content="https://endu-lab.github.io/Bible_Quize/icon-512.png">
    <meta property="og:url" content="https://endu-lab.github.io/Bible_Quize/">
    <meta property="og:type" content="website">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #27ae60;
            --bg: #f0f4f8;
            --text: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Roboto, 'Nyala', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; 
            padding: 15px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container { 
            background: rgba(255, 255, 255, 0.95); 
            width: 100%;
            max-width: 420px; 
            padding: 40px 25px; 
            border-radius: 35px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
            position: relative; 
            overflow: hidden;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #timer-bar { 
            height: 6px; 
            background: linear-gradient(to right, #ff416c, #ff4b2b); 
            width: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            transition: width 1s linear; 
        }

        /* Logo Styling */
        .app-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); font-size: 2.8em; margin: 0; font-weight: 900; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; font-weight: 500; }

        .hidden { display: none; }

        input { 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            border-radius: 15px; 
            border: 2px solid #e2e8f0; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }

        .btn-start { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
            transition: transform 0.2s;
        }
        .btn-start:active { transform: scale(0.98); }

        .choice-btn { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 2px solid #edf2f7; 
            border-radius: 20px; 
            background: white; 
            font-weight: 600; 
            cursor: pointer; 
            text-align: left; 
            font-size: 16px; 
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }
        .choice-btn:hover { border-color: var(--primary); background: #f8fbff; transform: translateY(-2px); }

        .choice-label {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 14px;
        }

        #progress-bg { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        
        #qText { font-size: 1.4em; margin-bottom: 25px; line-height: 1.4; color: var(--text); font-weight: 700; }

        .fb-share {
            background: #1877F2 !important;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="timer-bar" class="hidden"></div>
    
    <div class="app-logo">
        <span style="font-size: 40px;">📖</span>
    </div>

    <h1>ቃል</h1>
    <p class="subtitle">የመጽሐፍ ቅዱስ ፈተና</p>

    <div id="step-reg">
        <input type="text" id="uName" placeholder="ሙሉ ስም (Full Name)">
        <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር (Phone Number)">
        <button class="btn-start" onclick="startApp()">መፈተን ጀምር ➔</button>
    </div>

    <div id="ad-box" class="hidden media"></div>

    <div id="step-quiz" class="hidden">
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <div id="timer-text" style="color: #e74c3c; font-weight: bold; margin-bottom: 15px;">ቀሪ ጊዜ፡ <span id="seconds">15</span> ሰከንድ</div>
        <div id="qText"></div>
        <div id="options-container">
            <button class="choice-btn" onclick="submitAns('A')"><div class="choice-label">ሀ</div> <span id="tA"></span></button>
            <button class="choice-btn" onclick="submitAns('B')"><div class="choice-label">ለ</div> <span id="tB"></span></button>
            <button class="choice-btn" onclick="submitAns('C')"><div class="choice-label">ሐ</div> <span id="tC"></span></button>
            <button class="choice-btn" onclick="submitAns('D')"><div class="choice-label">መ</div> <span id="tD"></span></button>
        </div>
    </div>

    <div id="step-res" class="hidden">
        <h2 style="color: var(--accent); margin: 0;">ተጠናቀቀ!</h2>
        <p>የእርስዎ ውጤት</p>
        <div style="font-size: 4.5em; font-weight:900; color: var(--primary); margin: 5px 0;"><span id="finalScore">0</span>%</div>
        
        <button class="btn-start" onclick="location.reload()">እንደገና ተጫወት</button>
        
        <button class="btn-start fb-share" onclick="shareToFB()">
            ውጤቴን ፌስቡክ ላይ ላጋራ
        </button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (ቀድሞ በነበረው ይቀጥላል) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc",
        authDomain: "biblicallanguagequizbot.firebaseapp.com",
        projectId: "biblicallanguagequizbot",
        storageBucket: "biblicallanguagequizbot.firebasestorage.app",
        messagingSenderId: "1040255793336",
        appId: "1:1040255793336:web:aea95b172a79204d57dc4d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [];
    let idx = 0, score = 0, ads = null;
    let timerInterval, timeLeft = 15;

    // --- LOGIC FUNCTIONS (ቀድሞ የነበሩት ግን የተሻሻሉ) ---
    async function startApp() {
        const n = document.getElementById('uName').value;
        const p = document.getElementById('uPhone').value;
        if(!n || !p) return alert("እባክዎ መረጃዎን ያስገቡ!");

        try {
            const adDoc = await db.collection("config").doc("ads").get();
            ads = adDoc.data();

            const snap = await db.collection("questions").get();
            let all = []; snap.forEach(doc => all.push(doc.data()));
            
            if(all.length === 0) return alert("ጥያቄዎች አልተገኙም!");
            qPool = all.sort(() => 0.5 - Math.random()).slice(0, 10); // ለሙከራ ወደ 10 አሳጥሬዋለሁ

            document.getElementById('step-reg').classList.add('hidden');
            if(ads && ads.pos === 'start') showAd(showQ); else showQ();
        } catch(e) {
            alert("የመረጃ ስህተት! እባክዎ ኢንተርኔትዎን ያረጋግጡ።");
        }
    }

    function showQ() {
        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('progress-fill').style.width = ((idx / qPool.length) * 100) + "%";
        document.getElementById('qText').innerText = q.text;
        document.getElementById('tA').innerText = q.options[0];
        document.getElementById('tB').innerText = q.options[1];
        document.getElementById('tC').innerText = q.options[2];
        document.getElementById('tD').innerText = q.options[3];
        startTimer();
    }

    function startTimer() {
        timeLeft = 15;
        const bar = document.getElementById('timer-bar');
        bar.style.width = "100%";
        bar.classList.remove('hidden');
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;
            bar.style.width = (timeLeft / 15 * 100) + "%";
            if(timeLeft <= 0) { clearInterval(timerInterval); submitAns('TIMEOUT'); }
        }, 1000);
    }

    async function submitAns(letter) {
        clearInterval(timerInterval);
        if(letter === qPool[idx].correct) score++;
        idx++;
        if(idx < qPool.length) showQ(); else finish();
    }

    function finish() {
        document.getElementById('step-quiz').classList.add('hidden');
        document.getElementById('timer-bar').classList.add('hidden');
        const pct = Math.round((score / qPool.length) * 100);
        document.getElementById('finalScore').innerText = pct;
        document.getElementById('step-res').classList.remove('hidden');
        
        db.collection("results").add({
            name: document.getElementById('uName').value,
            phone: document.getElementById('uPhone').value,
            score: pct,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // --- FACEBOOK SHARE FUNCTION ---
    function shareToFB() {
        const score = document.getElementById('finalScore').innerText;
        const url = encodeURIComponent("https://endu-lab.github.io/Bible_Quize/");
        const text = encodeURIComponent(`እኔ በቃል የመጽሐፍ ቅዱስ ፈተና ${score}% አምጥቻለሁ! እናንተስ እውቀታችሁን መፈተን ትፈልጋላችሁ?`);
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, '_blank');
    }
</script>

</body>
</html>

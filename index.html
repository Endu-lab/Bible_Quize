<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --light-sky: #e1f5fe;
        }

        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--light-sky) 100%); 
            color: #333; overflow-x: hidden;
        }

        /* --- ማስታወቂያዎች (Ad Slots) --- */
        .ad-box { 
            position: fixed; 
            background: #ffffff; 
            overflow: hidden; 
            z-index: 9999; /* ሁልጊዜ ከላይ እንዲሆን */
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* የላይኛውና የታችኛው ማስታወቂያ */
        .ad-top { top: 10px; width: 90%; height: 65px; left: 5%; }
        .ad-bottom { bottom: 10px; width: 90%; height: 65px; left: 5%; }

        /* የጎን ማስታወቂያዎች (Sidebar) - ስፋቱ ተስተካክሏል */
        .ad-side { 
            width: 140px; /* በጣም እንዳይሰፋ ተቀንሷል */
            height: 500px; 
            top: 50%; 
            transform: translateY(-50%); 
        }
        .ad-left { left: 15px; }
        .ad-right { right: 15px; }

        /* ምስሉ ሳጥኑን እንዲሞላ */
        .ad-media { width: 100%; height: 100%; object-fit: cover; }

        /* በስልክ ላይ የጎን ማስታወቂያዎች እንዳይታዩ */
        @media (max-width: 1100px) { .ad-side { display: none; } }

        /* --- ዋናው የጥያቄ ሳጥን --- */
        .container { 
            background: white; 
            width: 90%; 
            max-width: 480px; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            text-align: center; 
            position: relative; 
            z-index: 10;
        }

        #qText {
            font-weight: bold; font-size: 1.25em; background: var(--light-sky);
            padding: 20px; border-radius: 12px; color: var(--primary);
            margin-bottom: 20px; line-height: 1.5;
        }

        .btn { 
            width: 100%; padding: 15px; background: var(--primary); 
            color: white; border: none; border-radius: 10px; 
            cursor: pointer; font-weight: bold; margin-top: 10px; 
            font-size: 1.1em; transition: 0.2s;
        }

        .opt-btn {
            background: #ffffff; color: #333; text-align: left;
            border: 2px solid #eee; display: flex; align-items: center;
        }

        .label-box {
            background: var(--primary); color: white; min-width: 30px;
            height: 30px; display: flex; align-items: center; justify-content: center;
            border-radius: 5px; margin-right: 12px;
        }

        /* ውጤት ሲዘጋጅ የሚታይ ማስታወቂያ */
        #interstitial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>

    <div class="ad-box ad-top" id="slot-top"></div>
    <div class="ad-box ad-bottom" id="slot-bottom"></div>
    <div class="ad-box ad-side ad-left" id="slot-left"></div>
    <div class="ad-box ad-side ad-right" id="slot-right"></div>

    <div id="interstitial-overlay">
        <p id="timer-text" style="color:white; font-size:1.1em;">ውጤትዎ እየተዘጋጀ ነው...</p>
        <div id="interstitial-content" style="width:300px; height:400px; margin-top:15px; border-radius:10px; overflow:hidden; background:white;"></div>
    </div>

    <div class="container">
        <h1 style="color:var(--primary); margin:0; font-size: 2.2em;">ቃሉ!</h1>
        <div id="step-reg">
            <p style="color:#777; margin-bottom:20px;">የመጽሐፍ ቅዱስ እውቀት መፈተኛ</p>
            <input type="text" id="uName" placeholder="ሙሉ ስም">
            <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
            <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
        </div>

        <div id="step-quiz" class="hidden">
            <p id="qText"></p>
            <div id="options-container"></div>
        </div>

        <div id="step-res" class="hidden">
            <h2 style="color:var(--primary);">እንኳን ደስ አለዎት!</h2>
            <div style="font-size: 4em; font-weight:900; color: var(--accent); margin: 15px 0;"><span id="finalScore">0</span>%</div>
            <button class="btn" onclick="location.reload()">እንደገና ተጫወት</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc",
        authDomain: "biblicallanguagequizbot.firebaseapp.com",
        projectId: "biblicallanguagequizbot",
        storageBucket: "biblicallanguagequizbot.firebasestorage.app",
        messagingSenderId: "1040255793336",
        appId: "1:1040255793336:web:83444c54330769d257dc4d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], adsList = [], interstitialData = null;
    let idx = 0, score = 0;

    async function startApp() {
        const name = document.getElementById('uName').value;
        if(!name) return alert("እባክዎ ስምዎን ያስገቡ!");
        try {
            const configSnap = await db.collection("ads").doc("config").get();
            if(configSnap.exists) adsList = configSnap.data().list;
            const intSnap = await db.collection("ads").doc("interstitial").get();
            if(intSnap.exists) interstitialData = intSnap.data();
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => qPool.push(doc.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 5);
            document.getElementById('step-reg').classList.add('hidden');
            showQ();
        } catch(e) { alert("መረጃ መጫን አልተቻለም!"); }
    }

    function renderImg(adData) {
        const imgHtml = `<img src="${adData.img}" class="ad-media">`;
        return (adData.link && adData.link !== "#") 
            ? `<a href="${adData.link}" target="_blank" style="width:100%; height:100%; display:block;">${imgHtml}</a>` 
            : imgHtml;
    }

    function updateAds() {
        if(!adsList || adsList.length === 0) return;
        ['slot-top', 'slot-bottom', 'slot-left', 'slot-right'].forEach(slotId => {
            const randomAd = adsList[Math.floor(Math.random() * adsList.length)];
            const slot = document.getElementById(slotId);
            if(slot) slot.innerHTML = renderImg(randomAd);
        });
    }

    function showQ() {
        updateAds();
        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('qText').innerText = q.text;
        let html = '';
        const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            html += `<button class="btn opt-btn" onclick="submitAns('${String.fromCharCode(65+i)}')">
                        <div class="label-box">${labels[i]}</div><span>${opt}</span>
                    </button>`;
        });
        document.getElementById('options-container').innerHTML = html;
    }

    function submitAns(ans) {
        if(ans === qPool[idx].correct) {
            score++;
            document.getElementById('snd-correct').play().catch(()=>{});
        } else {
            document.getElementById('snd-wrong').play().catch(()=>{});
        }
        idx++;
        setTimeout(() => {
            if(idx < qPool.length) showQ(); else showInterstitial();
        }, 600);
    }

    function showInterstitial() {
        document.getElementById('step-quiz').classList.add('hidden');
        if(!interstitialData) return finish();
        const overlay = document.getElementById('interstitial-overlay');
        overlay.style.display = 'flex';
        document.getElementById('interstitial-content').innerHTML = renderImg(interstitialData);
        setTimeout(() => { overlay.style.display = 'none'; finish(); }, 3000);
    }

    function finish() {
        document.getElementById('finalScore').innerText = Math.round((score/qPool.length)*100);
        document.getElementById('step-res').classList.remove('hidden');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Bible Quiz App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --light-sky: #f0f8ff;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; 
            margin: 0; padding: 0;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--light-sky) 100%); 
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* 1. Header & Logo (Fixed) */
        .app-header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: white; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; box-sizing: border-box;
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 2. Moving News Ticker (Promotion) */
        .news-ticker {
            position: fixed; top: 60px; width: 100%; background: var(--primary);
            color: white; overflow: hidden; white-space: nowrap; padding: 5px 0; z-index: 900;
        }
        .news-ticker p { display: inline-block; animation: ticker 15s linear infinite; margin: 0; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 3. Main Quiz Card (PWA Style) */
        .container { 
            background: white; width: 90%; max-width: 400px; 
            padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center; position: relative; z-index: 100;
            transition: all 0.4s ease; margin-top: 40px;
        }

        /* Animated Animal Placeholder */
        .animal-icon { font-size: 50px; margin-bottom: 10px; transition: transform 0.3s; }
        .correct-jump { animation: jump 0.5s ease; }
        @keyframes jump { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-20px);} }

        /* Timer UI */
        #timer-box { font-weight: bold; color: var(--error); font-size: 1.2em; border: 2px solid #eee; padding: 5px 15px; border-radius: 15px; }

        /* Form & Buttons */
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 10px; }
        .opt-btn { background: #f9f9f9; color: #333; text-align: left; display: flex; align-items: center; border: 2px solid #eee; }
        .label-box { background: var(--primary); color: white; min-width: 30px; height: 30px; border-radius: 5px; margin-right: 15px; display: flex; align-items: center; justify-content: center; }

        /* Ads Overlay */
        #ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        /* Reward Roll */
        #roll-zone { display: none; padding: 20px; }
        .gift-box { font-size: 80px; animation: wobble 1s infinite; cursor: pointer; }
        @keyframes wobble { 0%, 100% {transform: rotate(0);} 25% {transform: rotate(5deg);} 75% {transform: rotate(-5deg);} }

        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>

    <div class="app-header">
        <h2 style="color:var(--primary); margin:0;">ቃሉ!</h2>
        <div id="timer-box" class="hidden">60</div>
    </div>

    <div class="news-ticker">
        <p>🌟 ቃሉን ይፈትኑ፣ እውቀትዎን ያሳድጉ እና ይሸለሙ! ጓደኞችዎን ይጋብዙ እና ተጨማሪ ዕድሎችን ያግኙ! 🌟</p>
    </div>

    <div id="ad-overlay">
        <h3>የማስታወቂያ እረፍት</h3>
        <div id="ad-box" style="width:300px; height:250px; background:#f0f0f0; margin:20px 0; border-radius:15px; overflow:hidden;"></div>
        <p>ለጥቂት ሰከንዶች ይጠብቁ...</p>
        <button id="close-ad-btn" class="btn" style="width:200px; display:none;" onclick="hideAd()">ቀጥል ➔</button>
    </div>

    <div class="container" id="quiz-card">
        <div class="animal-icon" id="pet">🐑</div>

        <div id="reg-screen">
            <h3>እንኳን ደህና መጡ!</h3>
            <input type="text" id="uName" placeholder="ሙሉ ስም">
            <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
            <button class="btn" onclick="initApp()">መፈተን ጀምር ➔</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <p id="qText" style="font-weight:bold; min-height:60px;"></p>
            <div id="options-list"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>ውጤትዎ</h2>
            <h1 id="score-val" style="color:var(--accent); font-size:3em;">0%</h1>
            <div id="roll-zone">
                <p>ድንቅ ነው! የሎተሪ እጣዎን ይሞክሩ</p>
                <div class="gift-box" onclick="startRoll()">🎁</div>
                <p id="roll-status">ሳጥኑን ይጫኑ!</p>
            </div>
            <button class="btn" onclick="location.reload()">እንደገና ሞክር</button>
        </div>
    </div>

<script>
    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", authDomain: "biblicallanguagequizbot.firebaseapp.com", projectId: "biblicallanguagequizbot", storageBucket: "biblicallanguagequizbot.firebasestorage.app", messagingSenderId: "1040255793336", appId: "1:1040255793336:web:83444c54330769d257dc4d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let questions = [], ads = [], currentIdx = 0, score = 0, timer, timeLeft = 60;

    // LocalStorage: Remember user
    window.onload = () => {
        if(localStorage.getItem('q_name')) document.getElementById('uName').value = localStorage.getItem('q_name');
        if(localStorage.getItem('q_phone')) document.getElementById('uPhone').value = localStorage.getItem('q_phone');
    };

    async function initApp() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        if(!name || !phone) return alert("እባክዎ ስም እና ስልክ ያስገቡ!");
        
        localStorage.setItem('q_name', name);
        localStorage.setItem('q_phone', phone);

        try {
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => questions.push(doc.data()));
            questions = questions.sort(() => 0.5 - Math.random()).slice(0, 25);
            
            const adSnap = await db.collection("ads").doc("config").get();
            if(adSnap.exists) ads = adSnap.data().list;

            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById('timer-box').classList.remove('hidden');
            renderQuestion();
        } catch(e) { alert("መረጃ መጫን አልተቻለም!"); }
    }

    function renderQuestion() {
        // Ads every 3 questions
        if (currentIdx > 0 && currentIdx % 3 === 0) return showAd();

        const q = questions[currentIdx];
        const screen = document.getElementById('quiz-screen');
        screen.classList.remove('hidden');
        document.getElementById('qText').innerText = q.text;
        
        let btns = '';
        const lbls = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            btns += `<button class="btn opt-btn" onclick="checkAnswer('${String.fromCharCode(65+i)}')">
                        <div class="label-box">${lbls[i]}</div><span>${opt}</span>
                    </button>`;
        });
        document.getElementById('options-list').innerHTML = btns;
        startTimer();
    }

    function startTimer() {
        timeLeft = 60;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); checkAnswer('TIMEOUT'); }
        }, 1000);
    }

    function checkAnswer(ans) {
        clearInterval(timer);
        const correct = questions[currentIdx].correct;
        const pet = document.getElementById('pet');

        if(ans === correct) {
            score++;
            pet.innerText = "🦁"; // Lion for correct
            pet.classList.add('correct-jump');
            document.getElementById('snd-correct').play().catch(()=>{});
        } else {
            pet.innerText = "🐑"; // Lamb for wrong
            document.getElementById('snd-wrong').play().catch(()=>{});
        }

        setTimeout(() => {
            pet.classList.remove('correct-jump');
            currentIdx++;
            if(currentIdx < questions.length) renderQuestion(); else finishQuiz();
        }, 800);
    }

    function showAd() {
        const overlay = document.getElementById('ad-overlay');
        const adBox = document.getElementById('ad-box');
        const closeBtn = document.getElementById('close-ad-btn');
        overlay.style.display = 'flex';
        closeBtn.style.display = 'none';

        const randomAd = ads[Math.floor(Math.random() * ads.length)];
        adBox.innerHTML = `<img src="${randomAd.img}" style="width:100%; height:100%; object-fit:cover;">`;

        setTimeout(() => { closeBtn.style.display = 'block'; }, 4000); // 4 seconds forced ad
    }

    function hideAd() {
        document.getElementById('ad-overlay').style.display = 'none';
        renderQuestion();
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('timer-box').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const finalPct = Math.round((score/questions.length)*100);
        document.getElementById('score-val').innerText = finalPct + "%";
        
        if(finalPct >= 90) document.getElementById('roll-zone').style.display = 'block';
    }

    function startRoll() {
        const gift = document.querySelector('.gift-box');
        const status = document.getElementById('roll-status');
        gift.style.animation = "spin 0.5s infinite linear";
        status.innerText = "እየተሽከረከረ ነው...";

        setTimeout(() => {
            gift.style.animation = "none";
            const win = Math.random() < 0.15; // 15% Win chance
            if(win) {
                gift.innerText = "💰";
                status.innerText = "እንኳን ደስ አለዎት! አሸንፈዋል!";
                alert("የ50 ብር ካርድ አሸንፈዋል! በቅርቡ በስልክዎ ይላክለታል።");
            } else {
                gift.innerText = "📦";
                status.innerText = "ለዛሬ ዕድል አልቀናዎትም!";
            }
        }, 2500);
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
        });
    }
</script>

</body>
</html>

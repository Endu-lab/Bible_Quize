<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1a2a6c; --accent: #f39c12; --sky-blue: #87CEEB; --white: #ffffff; --success: #28a745; }
        
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            display: flex; flex-direction: column; 
            background: linear-gradient(180deg, var(--sky-blue) 0%, #f0f8ff 100%); 
            font-family: 'Nyala', 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }

        header { flex-shrink: 0; background: var(--white); box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 1000; }

        /* 1. ርዕሱን (Qal) ትልቅ እና ማራኪ ማድረግ */
        .logo-box { height: 75px; display: flex; justify-content: center; align-items: center; }
        .logo-box h1 { color: var(--primary); font-size: 3.5em; font-weight: 900; margin: 0; letter-spacing: 1px; }

        /* 2. የሚንቀሳቀሰውን ጽሁፍ (Ticker) ማሳደግ */
        .ticker-box { background: var(--primary); color: white; padding: 8px 0; overflow: hidden; white-space: nowrap; font-size: 1.05em; border-bottom: 2px solid var(--accent); }
        .ticker-box p { display: inline-block; animation: ticker 22s linear infinite; margin: 0; font-weight: bold; }
        
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 3. ዋናው ክፍል - ይዘቱ በቁመት መሃል እንዲሆን (Space Proportion) */
        main { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; 
            align-items: center; padding: 15px 20px 115px 20px; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
        }

        /* 4. የጥያቄ ሳጥኑ (Quiz Card) ስፋትና ውበት */
        .quiz-card { 
            background: var(--white); width: 100%; max-width: 440px; 
            padding: 30px 20px; border-radius: 28px; 
            box-shadow: 0 12px 35px rgba(0,0,0,0.12); 
            text-align: center; box-sizing: border-box;
            animation: fadeIn 0.6s ease-out;
        }

        /* 5. የማስታወቂያ ቦታውን (Footer) ማስፋት */
        footer { 
            flex-shrink: 0; height: 105px; 
            background: white; border-top: 3px solid var(--primary); 
            display: flex; align-items: center; justify-content: center; 
            position: fixed; bottom: 0; width: 100%; z-index: 2000; 
        }
        .ad-banner-img { height: 80px; width: auto; max-width: 95%; object-fit: contain; border-radius: 10px; cursor: pointer; }

        /* ሌሎች ነባር ስታይሎች */
        #timer-box { width: 55px; height: 55px; border: 3.5px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-weight: 900; color: #e74c3c; font-size: 1.4em; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 1.15em; transition: 0.2s; box-shadow: 0 3px 5px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.97); }
        .opt-btn { background: #ffffff; color: #333; text-align: left; border: 2px solid #eee; display: flex; align-items: center; }
        .label { background: var(--primary); color: white; min-width: 35px; height: 35px; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 1em; }
        
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 14px; border-radius: 12px; border: 1.5px solid #ddd; box-sizing: border-box; font-size: 1.15em; outline: none; }
        input:focus { border-color: var(--primary); }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>
    <audio id="ad-audio" preload="auto"></audio>

    <header>
        <div class="logo-box"><h1>ቃል</h1></div>
        <div class="ticker-box"><p>🌟 ቃሉን ይፈትኑ፣ እውቀትዎን ያሳድጉ እና ይሸለሙ! • ጓደኞችዎን ይጋብዙ! 🌟</p></div>
    </header>

    <main>
        <div class="quiz-card" id="q-card">
            <div id="pet" style="font-size: 50px; margin-bottom: 10px;">🐑</div>
            
            <div id="scr-start">
                <input type="text" id="uName" placeholder="ሙሉ ስም">
                <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
                <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
            </div>

            <div id="scr-quiz" class="hidden">
                <div id="timer-box">20</div>
                <p id="qText" style="font-weight:bold; font-size:1.2em; min-height:60px;"></p>
                <div id="opts-box"></div>
            </div>

            <div id="scr-res" class="hidden">
                <h1 id="res-pct" style="color:var(--accent); font-size:4.5em; margin:15px 0;">0%</h1>
                <div id="roll-section" class="hidden">
                    <p style="font-weight:bold;">ዕጣዎን ይሞክሩ!</p>
                    <div id="gift-box" style="font-size:70px; cursor:pointer;" onclick="startRoll()">🎁</div>
                </div>
                <button class="btn" onclick="location.reload()" style="background:#888;">እንደገና</button>
            </div>
        </div>
    </main>

    <footer>
        <div id="ad-banner-box" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; gap:10px;">
            <p style="color:#ccc; font-size:0.7em;">Loading Ad...</p>
        </div>
    </footer>

<script>
    // Firebase ማዋቀሪያ
    const firebaseConfig = { 
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", 
        authDomain: "biblicallanguagequizbot.firebaseapp.com", 
        projectId: "biblicallanguagequizbot", 
        storageBucket: "biblicallanguagequizbot.firebasestorage.app", 
        messagingSenderId: "1040255793336", 
        appId: "1:1040255793336:web:83444c54330769d257dc4d" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Registration Failed', err));
        });
    }

    let qPool = [], ads = [], qIdx = 0, score = 0, timer, tLeft = 20;
    let winChance = 15, minToRoll = 90;

    async function startApp() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
        if(!n || !p) return alert("ስም እና ስልክ ያስገቡ!");
        localStorage.setItem('un', n); localStorage.setItem('up', p);

        try {
            const rewSnap = await db.collection("config").doc("rewards").get();
            if(rewSnap.exists) {
                winChance = rewSnap.data().winRate || 15;
                minToRoll = rewSnap.data().minScore || 90;
            }

            const adSnap = await db.collection("ads").doc("config").get();
            if(adSnap.exists) ads = adSnap.data().list || [];

            const qSnap = await db.collection("questions").get();
            qSnap.forEach(d => qPool.push(d.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 25);

            document.getElementById('scr-start').classList.add('hidden');
            renderQ();
            updateBanner();
            setInterval(updateBanner, 7000); 

        } catch(e) { console.error(e); alert("ግንኙነት ተቋርጧል!"); }
    }

    function renderQ() {
        document.getElementById('scr-quiz').classList.remove('hidden');
        const q = qPool[qIdx];
        document.getElementById('qText').innerText = q.text;
        let h = ''; const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            h += `<button class="btn opt-btn" onclick="checkAns('${String.fromCharCode(65+i)}')"><div class="label">${labels[i]}</div><span>${opt}</span></button>`;
        });
        document.getElementById('opts-box').innerHTML = h;
        startTimer();
    }

    function updateBanner() {
        if(!ads || ads.length === 0) return;
        const r = ads[Math.floor(Math.random() * ads.length)];
        const adBox = document.getElementById('ad-banner-box');
        const adAudio = document.getElementById('ad-audio');

        adBox.innerHTML = `
            <div style="display:flex; align-items:center; gap:12px; animation: fadeIn 0.8s;">
                <img src="${r.img}" class="ad-banner-img" onclick="window.open('${r.link || '#'}', '_blank')">
                <div style="text-align:left; line-height:1.2; cursor:pointer;" onclick="window.open('${r.link || '#'}', '_blank')">
                    <div style="color:var(--primary); font-weight:bold; font-size:0.85em;">የቀኑ ማስታወቂያ</div>
                    <div style="color:#777; font-size:0.7em;">ለመክፈት እዚህ ይንኩ</div>
                </div>
            </div>
        `;

        if(r.audio && r.audio.trim() !== "") {
            adAudio.src = r.audio;
            adAudio.play().catch(e => {});
        }
    }

    function startTimer() {
        tLeft = 20; clearInterval(timer);
        document.getElementById('timer-box').innerText = tLeft;
        timer = setInterval(() => { 
            tLeft--; 
            document.getElementById('timer-box').innerText = tLeft; 
            if(tLeft <= 0) { clearInterval(timer); checkAns('X'); } 
        }, 1000);
    }

    function checkAns(a) {
        clearInterval(timer);
        if(a === qPool[qIdx].correct) { 
            score++; 
            document.getElementById('pet').innerText = "🦁"; 
            document.getElementById('snd-correct').play().catch(()=>{}); 
        } else { 
            document.getElementById('pet').innerText = "🐑"; 
            document.getElementById('snd-wrong').play().catch(()=>{}); 
        }
        setTimeout(() => { 
            qIdx++; 
            if(qIdx < qPool.length) renderQ(); 
            else showFinal(); 
        }, 600);
    }

    async function showFinal() {
        document.getElementById('scr-quiz').classList.add('hidden');
        document.getElementById('scr-res').classList.remove('hidden');
        const p = Math.round((score/qPool.length)*100);
        document.getElementById('res-pct').innerText = p + "%";
        
        await db.collection("results").add({ 
            name: localStorage.getItem('un'), 
            phone: localStorage.getItem('up'), 
            score: p, 
            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        });
        
        if(p >= minToRoll) document.getElementById('roll-section').classList.remove('hidden');
    }

    function startRoll() {
        const gift = document.getElementById('gift-box');
        const rollSection = document.getElementById('roll-section');
        const userPhone = localStorage.getItem('up') || "---";
        const userName = localStorage.getItem('un') || "ተማሪ";
        
        gift.style.animation = "shake 0.8s infinite";
        rollSection.querySelector('p').innerText = "ዕጣዎን በመፈለግ ላይ...";

        setTimeout(async () => {
            gift.style.animation = "none";
            const win = (Math.random() * 100) < winChance;

            if (win) {
                rollSection.style.background = "#d4edda"; 
                rollSection.style.padding = "25px";
                rollSection.style.borderRadius = "20px";
                rollSection.style.border = "3px solid #28a745";
                rollSection.style.marginTop = "20px";
                rollSection.style.animation = "fadeIn 1s";

                rollSection.innerHTML = `
                    <div style="font-size:90px; margin-bottom:10px;">🎉</div>
                    <h2 style="color:#28a745; margin:5px 0;">እንኳን ደስ አሎት!</h2>
                    <p style="font-weight:bold; font-size:1.2em; color:#155724;">የ 5 ብር ካርድ አግኝተዋል!</p>
                    <div style="background:#fff; padding:15px; border-radius:12px; margin:15px 0; border:1px dashed #28a745;">
                        <span style="color:#777; font-size:0.9em;">ሽልማቱ የሚላክበት ስልክ፦</span><br>
                        <strong style="font-size:1.4em; color:#1a2a6c;">${userPhone}</strong>
                    </div>
                    <p style="font-size:0.9em; color:#555;">መረጃው ተመዝግቧል። በ 24 ሰዓት ውስጥ ካርዱ ይላክለታል።</p>
                `;

                try {
                    await db.collection("winners").add({
                        name: userName,
                        phone: userPhone,
                        prize: "5 ETB Card",
                        status: "Pending",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch(e) { console.error("Winner log failed:", e); }

            } else {
                rollSection.innerHTML = `
                    <div style="font-size:80px; margin-bottom:10px; opacity:0.6;">😔</div>
                    <h2 style="color:#e74c3c; margin:5px 0;">አልደረሰዎትም!</h2>
                    <p style="color:#666;">ጥሩ ሙከራ ነው! በሚቀጥለው ጊዜ ይሳካለዎታል ብለን ተስፋ እናደርጋለን።</p>
                    <button class="btn" onclick="location.reload()" style="background:#888; width:auto; padding:10px 25px;">እንደገና</button>
                `;
            }
        }, 3000);
    }
</script>
</body>
</html>

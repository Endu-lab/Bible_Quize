<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1a2a6c; --accent: #f39c12; --sky-blue: #87CEEB; --white: #ffffff; --success: #28a745; }
        
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            display: flex; flex-direction: column; 
            background: linear-gradient(180deg, var(--sky-blue) 0%, #f0f8ff 100%); 
            font-family: 'Nyala', 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }

        header { flex-shrink: 0; background: var(--white); box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 1000; }

        /* 1. ርዕሱን ለቦታ ቁጠባ በትንሹ ማስተካከል */
        .logo-box { height: 65px; display: flex; justify-content: center; align-items: center; }
        .logo-box h1 { color: var(--primary); font-size: 3em; font-weight: 900; margin: 0; letter-spacing: 1px; }

        /* 2. Ticker */
        .ticker-box { background: var(--primary); color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; font-size: 1em; border-bottom: 2px solid var(--accent); }
        .ticker-box p { display: inline-block; animation: ticker 22s linear infinite; margin: 0; font-weight: bold; }
        
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 3. ዋናው ክፍል - ይዘቱ ከላይ እንዲጀምር (Scroll እንዳይመጣ) */
        main { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; padding: 10px 15px 120px 15px; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
        }

        /* 4. የጥያቄ ሳጥኑ (Quiz Card) */
        .quiz-card { 
            background: var(--white); width: 100%; max-width: 440px; 
            padding: 20px 15px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.12); 
            text-align: center; box-sizing: border-box;
            animation: fadeIn 0.6s ease-out;
            margin-top: 5px;
        }

        /* 5. Footer (Ad Space) */
        footer { 
            flex-shrink: 0; height: 105px; 
            background: white; border-top: 3px solid var(--primary); 
            display: flex; align-items: center; justify-content: center; 
            position: fixed; bottom: 0; width: 100%; z-index: 2000; 
        }
        .ad-banner-img { height: 80px; width: auto; max-width: 95%; object-fit: contain; border-radius: 10px; cursor: pointer; }

        #timer-box { width: 50px; height: 50px; border: 3px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-weight: 900; color: #e74c3c; font-size: 1.3em; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 1.1em; transition: 0.2s; box-shadow: 0 3px 5px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.97); }
        .opt-btn { background: #ffffff; color: #333; text-align: left; border: 2px solid #eee; display: flex; align-items: center; }
        .label { background: var(--primary); color: white; min-width: 32px; height: 32px; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 0.9em; }
        
        .hidden { display: none; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1.5px solid #ddd; box-sizing: border-box; font-size: 1.1em; outline: none; }
        input:focus { border-color: var(--primary); }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>
    <audio id="ad-audio" preload="auto"></audio>

    <header>
        <div class="logo-box"><h1>ቃል</h1></div>
        <div class="ticker-box"><p>🌟 ቃሉን ይፈትኑ፣ እውቀትዎን ያሳድጉ እና ይሸለሙ! • ጓደኞችዎን ይጋብዙ! 🌟</p></div>
    </header>

    <main>
        <div class="quiz-card" id="q-card">
            <div id="pet" style="font-size: 45px; margin-bottom: 8px;">🐑</div>
            
            <div id="scr-start">
                <input type="text" id="uName" placeholder="ሙሉ ስም">
                <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
                <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
            </div>

            <div id="scr-quiz" class="hidden">
                <div id="timer-box">20</div>
                <p id="qText" style="font-weight:bold; font-size:1.15em; min-height:50px; margin: 10px 0;"></p>
                <div id="opts-box"></div>
            </div>

            <div id="scr-res" class="hidden">
                <h1 id="res-pct" style="color:var(--accent); font-size:4em; margin:10px 0;">0%</h1>
                <div id="roll-section" class="hidden">
                    <p style="font-weight:bold;">ዕጣዎን ይሞክሩ!</p>
                    <div id="gift-box" style="font-size:60px; cursor:pointer;" onclick="startRoll()">🎁</div>
                </div>
                <button class="btn" onclick="location.reload()" style="background:#888;">እንደገና</button>
            </div>
        </div>
    </main>

    <footer>
        <div id="ad-banner-box" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; gap:10px;">
            <p style="color:#ccc; font-size:0.7em;">Loading Ad...</p>
        </div>
    </footer>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", 
        authDomain: "biblicallanguagequizbot.firebaseapp.com", 
        projectId: "biblicallanguagequizbot", 
        storageBucket: "biblicallanguagequizbot.firebasestorage.app", 
        messagingSenderId: "1040255793336", 
        appId: "1:1040255793336:web:83444c54330769d257dc4d" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Registration Failed', err));
        });
    }

    let qPool = [], ads = [], qIdx = 0, score = 0, timer, tLeft = 20;
    let winChance = 15, minToRoll = 90;

    async function startApp() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
        if(!n || !p) return alert("ስም እና ስልክ ያስገቡ!");
        localStorage.setItem('un', n); localStorage.setItem('up', p);

        try {
            const rewSnap = await db.collection("config").doc("rewards").get();
            if(rewSnap.exists) {
                winChance = rewSnap.data().winRate || 15;
                minToRoll = rewSnap.data().minScore || 90;
            }

            const adSnap = await db.collection("ads").doc("config").get();
            if(adSnap.exists) ads = adSnap.data().list || [];

            const qSnap = await db.collection("questions").get();
            qSnap.forEach(d => qPool.push(d.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 25);

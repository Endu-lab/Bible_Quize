<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Bible Quiz App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; 
            margin: 0; padding: 0;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #f0f8ff 100%); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 1. Header Area (Fixed Top) */
        header { width: 100%; z-index: 2000; position: relative; background: var(--white); }
        .logo-area {
            height: 70px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo-area h1 { color: var(--primary); font-size: 3em; font-weight: 900; margin: 0; }

        .ticker-wrap {
            background: var(--primary); color: white; padding: 4px 0;
            overflow: hidden; white-space: nowrap; font-size: 0.85em;
        }
        .ticker-wrap p { display: inline-block; animation: ticker 20s linear infinite; margin: 0; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 2. Main Scrollable/Centered Area */
        main {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 10px; position: relative; overflow-y: auto;
        }

        .app-card { 
            background: var(--white); width: 100%; max-width: 380px; 
            padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center; margin-bottom: 70px; /* Space for bottom ad */
        }

        #timer-box { 
            width: 50px; height: 50px; border: 3px solid #e74c3c; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px; font-size: 1.3em; font-weight: 900; color: #e74c3c;
        }

        /* 3. Small Bottom Ad Banner */
        .bottom-ad {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: #fff; border-top: 1px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            z-index: 1500; overflow: hidden;
        }
        .ad-img { height: 100%; width: auto; object-fit: contain; }

        /* Buttons & Inputs */
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 8px; font-size: 1em; }
        .opt-btn { background: #fdfdfd; color: #333; text-align: left; border: 1px solid #eee; display: flex; align-items: center; }
        .label { background: var(--primary); color: white; min-width: 28px; height: 28px; border-radius: 5px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.9em; }

        /* Full Overlay Ads */
        #ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>
    <audio id="ad-audio" loop></audio>

    <header>
        <div class="logo-area"><h1>ቃል</h1></div>
        <div class="ticker-wrap"><p>🌟 እንኳን ደስ አለዎት! አሸናፊዎች እየተመዘገቡ ነው። • ጓደኞችዎን ይጋብዙ! • ቃሉን ይፈትኑ ይሸለሙ! 🌟</p></div>
    </header>

    <div id="ad-overlay">
        <h3>ማስታወቂያ</h3>
        <div id="full-ad-box" style="width:280px; height:280px; background:#f0f0f0; margin:15px 0; border-radius:15px; overflow:hidden;"></div>
        <p id="ad-wait-msg">ለ 5 ሰከንድ ይጠብቁ...</p>
        <button id="ad-close-btn" class="btn" style="width:180px; display:none;" onclick="closeForcedAd()">ቀጥል ➔</button>
    </div>

    <main>
        <div class="app-card" id="main-card">
            <div style="font-size: 40px; margin-bottom: 5px;" id="pet">🐑</div>

            <div id="start-step">
                <input type="text" id="uName" placeholder="ሙሉ ስም">
                <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
                <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
            </div>

            <div id="quiz-step" class="hidden">
                <div id="timer-box">20</div>
                <p id="qText" style="font-weight:bold; font-size:1.1em; margin:10px 0; min-height:50px;"></p>
                <div id="opt-list"></div>
            </div>

            <div id="result-step" class="hidden">
                <h1 id="final-pct" style="color:var(--accent); font-size:3.5em; margin:5px 0;">0%</h1>
                <div id="roll-div" class="hidden">
                    <p>ዕጣዎን ይሞክሩ!</p>
                    <div style="font-size:60px; cursor:pointer;" onclick="runRoll()">🎁</div>
                </div>
                <button class="btn" onclick="location.reload()" style="background:#888;">እንደገና</button>
            </div>
        </div>
    </main>

    <div class="bottom-ad" id="bottom-banner">
        <p style="color:#ccc; font-size:0.7em;">Advertisement</p>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", authDomain: "biblicallanguagequizbot.firebaseapp.com", projectId: "biblicallanguagequizbot", storageBucket: "biblicallanguagequizbot.firebasestorage.app", messagingSenderId: "1040255793336", appId: "1:1040255793336:web:83444c54330769d257dc4d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], ads = [], idx = 0, score = 0, timer, timeLeft = 20;

    window.onload = () => {
        if(localStorage.getItem('un')) document.getElementById('uName').value = localStorage.getItem('un');
        if(localStorage.getItem('up')) document.getElementById('uPhone').value = localStorage.getItem('up');
    };

    async function startApp() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        if(!name || !phone) return alert("ስም እና ስልክ ያስገቡ!");
        localStorage.setItem('un', name); localStorage.setItem('up', phone);

        try {
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => qPool.push(doc.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 25);
            
            const adSnap = await db.collection("ads").doc("config").get();
            if(adSnap.exists) ads = adSnap.data().list;

            document.getElementById('start-step').classList.add('hidden');
            renderQ();
        } catch(e) { alert("Error loading data!"); }
    }

    function renderQ() {
        updateBottomAd();
        if (idx > 0 && idx % 3 === 0) return showForcedAd();

        document.getElementById('quiz-step').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('qText').innerText = q.text;
        
        let html = '';
        const lbls = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            html += `<button class="btn opt-btn" onclick="submitAns('${String.fromCharCode(65+i)}')">
                        <div class="label">${lbls[i]}</div><span>${opt}</span>
                    </button>`;
        });
        document.getElementById('opt-list').innerHTML = html;
        startTimer();
    }

    function updateBottomAd() {
        if(!ads.length) return;
        const randAd = ads[Math.floor(Math.random() * ads.length)];
        document.getElementById('bottom-banner').innerHTML = `<img src="${randAd.img}" class="ad-img">`;
        if(randAd.audio) {
            const audio = document.getElementById('ad-audio');
            audio.src = randAd.audio; audio.play().catch(()=>{});
        }
    }

    function startTimer() {
        timeLeft = 20; clearInterval(timer);
        document.getElementById('timer-box').innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--; document.getElementById('timer-box').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); submitAns('TIMEOUT'); }
        }, 1000);
    }

    function submitAns(ans) {
        clearInterval(timer);
        if(ans === qPool[idx].correct) {
            score++; document.getElementById('pet').innerText = "🦁";
            document.getElementById('snd-correct').play().catch(()=>{});
        } else {
            document.getElementById('pet').innerText = "🐑";
            document.getElementById('snd-wrong').play().catch(()=>{});
        }
        setTimeout(() => {
            idx++; if(idx < qPool.length) renderQ(); else showResult();
        }, 600);
    }

    function showForcedAd() {
        document.getElementById('quiz-step').classList.add('hidden');
        const overlay = document.getElementById('ad-overlay');
        overlay.style.display = 'flex';
        document.getElementById('ad-close-btn').style.display = 'none';

        const rAd = ads[Math.floor(Math.random() * ads.length)];
        document.getElementById('full-ad-box').innerHTML = `<img src="${rAd.img}" style="width:100%; height:100%; object-fit:cover;">`;

        let wait = 5;
        const intv = setInterval(() => {
            wait--; document.getElementById('ad-wait-msg').innerText = `ለ ${wait} ሰከንድ ይጠብቁ...`;
            if(wait <= 0) { clearInterval(intv); document.getElementById('ad-wait-msg').innerText = "አልቋል!"; document.getElementById('ad-close-btn').style.display = 'block'; }
        }, 1000);
    }

    function closeForcedAd() {
        document.getElementById('ad-overlay').style.display = 'none';
        renderQ();
    }

    function showResult() {
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('bottom-banner').style.display = 'none';
        document.getElementById('result-step').classList.remove('hidden');
        const pct = Math.round((score/qPool.length)*100);
        document.getElementById('final-pct').innerText = pct + "%";
        if(pct >= 90) document.getElementById('roll-div').classList.remove('hidden');
    }

    function runRoll() {
        const win = Math.random() < 0.15;
        alert(win ? "እንኳን ደስ አለዎት! አሸንፈዋል!" : "ዕድል የለም!");
    }
</script>
</body>
</html>

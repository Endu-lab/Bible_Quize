<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --light-sky: #e1f5fe;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', 'Nyala', sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--light-sky) 100%); 
            overflow: hidden;
        }

        /* Top & Bottom Ad Slots Only (Sides Removed) */
        .ad-box { 
            position: fixed; 
            z-index: 5; /* Lower than container to prevent covering logo */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .ad-top { top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.1); }
        .ad-bottom { bottom: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.1); }
        .ad-media { height: 100%; max-width: 100%; object-fit: contain; }

        .container { 
            background: white; width: 90%; max-width: 450px; 
            padding: 30px; border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center; position: relative; z-index: 100;
        }

        /* Timer Style */
        #timer-container {
            width: 80px; height: 80px; border-radius: 50%;
            border: 5px solid var(--light-sky);
            display: flex; align-items: center; justify-content: center;
            margin: 10px auto 20px; font-weight: bold; font-size: 1.5em;
            color: var(--primary); transition: 0.3s;
        }

        #qText {
            font-weight: bold; font-size: 1.2em; background: var(--light-sky);
            padding: 20px; border-radius: 15px; color: var(--primary);
            margin-bottom: 20px; min-height: 60px;
        }

        .btn { 
            width: 100%; padding: 15px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 1.1em;
        }

        .opt-btn {
            background: #ffffff; color: #333; text-align: left;
            border: 2px solid #eee; display: flex; align-items: center;
        }

        .label-box {
            background: var(--primary); color: white; min-width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; margin-right: 15px;
        }

        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; }

        #interstitial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>

    <div class="ad-box ad-top" id="slot-top"></div>
    <div class="ad-box ad-bottom" id="slot-bottom"></div>

    <div id="interstitial-overlay">
        <p id="wait-text" style="color:white; font-size:1.2em;">ውጤትዎ እየተዘጋጀ ነው...</p>
        <div id="interstitial-content" style="width:300px; height:400px; margin-top:15px; border-radius:15px; overflow:hidden; background:white;"></div>
    </div>

    <div class="container">
        <h1 style="color:var(--primary); margin:0; font-size: 2.5em; position: relative; z-index: 110;">ቃሉ!</h1>
        
        <div id="step-reg">
            <p style="color: #666; margin-bottom: 20px;">የመጽሐፍ ቅዱስ ጥያቄዎች</p>
            <input type="text" id="uName" placeholder="ሙሉ ስም">
            <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
            <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
        </div>

        <div id="step-quiz" class="hidden">
            <div id="timer-container">60</div>
            <p id="qText"></p>
            <div id="options-container"></div>
        </div>

        <div id="step-res" class="hidden">
            <h2 style="color:var(--primary);">እንኳን ደስ አለዎት!</h2>
            <div style="font-size: 4em; font-weight:900; color: var(--accent);"><span id="finalScore">0</span>%</div>
            <button class="btn" onclick="location.reload()">እንደገና ተጫወት</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc",
        authDomain: "biblicallanguagequizbot.firebaseapp.com",
        projectId: "biblicallanguagequizbot",
        storageBucket: "biblicallanguagequizbot.firebasestorage.app",
        messagingSenderId: "1040255793336",
        appId: "1:1040255793336:web:83444c54330769d257dc4d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], adsList = [], interstitialData = null;
    let idx = 0, score = 0, timeLeft = 60, timerInterval;

    async function startApp() {
        const name = document.getElementById('uName').value;
        if(!name) return alert("እባክዎ ስምዎን ያስገቡ!");
        try {
            const configSnap = await db.collection("ads").doc("config").get();
            if(configSnap.exists) adsList = configSnap.data().list;
            const intSnap = await db.collection("ads").doc("interstitial").get();
            if(intSnap.exists) interstitialData = intSnap.data();
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(doc => qPool.push(doc.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 5);
            document.getElementById('step-reg').classList.add('hidden');
            showQ();
        } catch(e) { alert("መረጃ መጫን አልተቻለም!"); }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 60;
        const display = document.getElementById('timer-container');
        display.style.color = 'var(--primary)';
        display.innerText = timeLeft;

        timerInterval = setInterval(() => {
            timeLeft--;
            display.innerText = timeLeft;
            if(timeLeft <= 10) display.style.color = 'var(--danger)';
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                submitAns('TIMEOUT');
            }
        }, 1000);
    }

    function updateAds() {
        if(!adsList || adsList.length === 0) return;
        ['slot-top', 'slot-bottom'].forEach(slotId => {
            const randomAd = adsList[Math.floor(Math.random() * adsList.length)];
            const slot = document.getElementById(slotId);
            if(slot) slot.innerHTML = `<img src="${randomAd.img}" class="ad-media">`;
        });
    }

    function showQ() {
        updateAds();
        startTimer();
        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qPool[idx];
        document.getElementById('qText').innerText = q.text;
        let html = '';
        const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            html += `<button class="btn opt-btn" onclick="submitAns('${String.fromCharCode(65+i)}')">
                        <div class="label-box">${labels[i]}</div><span>${opt}</span>
                    </button>`;
        });
        document.getElementById('options-container').innerHTML = html;
    }

    function submitAns(ans) {
        clearInterval(timerInterval);
        const correct = qPool[idx].correct;
        if(ans === correct) {
            score++;
            document.getElementById('snd-correct').play().catch(()=>{});
        } else {
            document.getElementById('snd-wrong').play().catch(()=>{});
        }
        idx++;
        setTimeout(() => {
            if(idx < qPool.length) showQ(); else showInterstitial();
        }, 600);
    }

    function showInterstitial() {
        document.getElementById('step-quiz').classList.add('hidden');
        if(!interstitialData) return finish();
        const overlay = document.getElementById('interstitial-overlay');
        overlay.style.display = 'flex';
        document.getElementById('interstitial-content').innerHTML = `<img src="${interstitialData.img}" style="width:100%; height:100%; object-fit:cover;">`;
        setTimeout(() => { overlay.style.display = 'none'; finish(); }, 3000);
    }

    function finish() {
        document.getElementById('finalScore').innerText = Math.round((score/qPool.length)*100);
        document.getElementById('step-res').classList.remove('hidden');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --white: #ffffff;
        }

        /* ስክሪኑን ለ 3 ክፍል ማዘጋጀት */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            display: flex; flex-direction: column; /* አቀባዊ አቀማመጥ */
            font-family: 'Segoe UI', 'Nyala', sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #f0f8ff 100%);
            overflow: hidden;
        }

        /* 1. የላይኛው ክፍል (Header) */
        header {
            flex-shrink: 0; background: var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .logo-box { height: 60px; display: flex; justify-content: center; align-items: center; }
        .logo-box h1 { color: var(--primary); font-size: 2.8em; font-weight: 900; margin: 0; }
        
        .ticker-box { background: var(--primary); color: white; padding: 5px 0; overflow: hidden; white-space: nowrap; font-size: 0.8em; }
        .ticker-box p { display: inline-block; animation: ticker 20s linear infinite; margin: 0; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 2. የመካከለኛው ክፍል (ጥያቄዎች) */
        main {
            flex-grow: 1; /* የቀረውን ሰፊ ቦታ ይይዛል */
            display: flex; justify-content: center; align-items: center;
            overflow-y: auto; padding: 15px; padding-bottom: 80px; /* ለማስታወቂያው ቦታ መተው */
        }
        .quiz-card {
            background: var(--white); width: 100%; max-width: 400px;
            padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 3. የታችኛው ክፍል (ባነር ማስታወቂያ) */
        footer {
            flex-shrink: 0; position: fixed; bottom: 0; width: 100%;
            height: 60px; background: #fff; border-top: 1px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .ad-banner-img { height: 100%; width: auto; object-fit: contain; }

        /* Timer & Buttons */
        #timer { width: 50px; height: 50px; border: 3px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: 900; color: #e74c3c; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 1em; }
        .opt-btn { background: #fdfdfd; color: #333; text-align: left; border: 1px solid #eee; display: flex; align-items: center; }
        .label { background: var(--primary); color: white; min-width: 30px; height: 30px; border-radius: 6px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }

        /* Forced Ads Overlay */
        #forced-ad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>
    <audio id="ad-audio" loop></audio>

    <header>
        <div class="logo-box"><h1>ቃል</h1></div>
        <div class="ticker-box"><p>🌟 ቃሉን ይፈትኑ፣ እውቀትዎን ያሳድጉ እና ይሸለሙ! ጓደኞችዎን ይጋብዙ! 🌟</p></div>
    </header>

    <div id="forced-ad">
        <h3>ማስታወቂያ</h3>
        <div id="ad-full-img" style="width:280px; height:280px; background:#eee; border-radius:15px; margin-bottom:15px; overflow:hidden;"></div>
        <p id="wait-txt">ለ 5 ሰከንድ ይጠብቁ...</p>
        <button id="close-ad" class="btn" style="width:180px; display:none;" onclick="hideForcedAd()">ቀጥል ➔</button>
    </div>

    <main>
        <div class="quiz-card" id="card">
            <div id="pet" style="font-size: 45px; margin-bottom: 10px;">🐑</div>

            <div id="step-start">
                <input type="text" id="uName" placeholder="ሙሉ ስም">
                <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
                <button class="btn" onclick="startApp()">ጀምር ➔</button>
            </div>

            <div id="step-quiz" class="hidden">
                <div id="timer">20</div>
                <p id="qText" style="font-weight:bold; min-height:50px;"></p>
                <div id="options"></div>
            </div>

            <div id="step-res" class="hidden">
                <h1 id="score-pct" style="color:var(--accent); font-size:4em;">0%</h1>
                <div id="roll-btn-box" class="hidden">
                    <p>ዕጣዎን ይሞክሩ!</p>
                    <div style="font-size:60px; cursor:pointer;" onclick="doRoll()">🎁</div>
                </div>
                <button class="btn" onclick="location.reload()" style="background:#777;">እንደገና</button>
            </div>
        </div>
    </main>

    <footer>
        <div id="ad-banner">
            <small style="color:#ccc">ባነር ማስታወቂያ</small>
        </div>
    </footer>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", authDomain: "biblicallanguagequizbot.firebaseapp.com", projectId: "biblicallanguagequizbot", storageBucket: "biblicallanguagequizbot.firebasestorage.app", messagingSenderId: "1040255793336", appId: "1:1040255793336:web:83444c54330769d257dc4d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qs = [], ads = [], idx = 0, score = 0, timer, timeLeft = 20;

    window.onload = () => {
        if(localStorage.getItem('un')) document.getElementById('uName').value = localStorage.getItem('un');
        if(localStorage.getItem('up')) document.getElementById('uPhone').value = localStorage.getItem('up');
    };

    async function startApp() {
        const name = document.getElementById('uName').value, phone = document.getElementById('uPhone').value;
        if(!name || !phone) return alert("መረጃ ያስገቡ!");
        localStorage.setItem('un', name); localStorage.setItem('up', phone);

        try {
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(d => qs.push(d.data()));
            qs = qs.sort(() => 0.5 - Math.random()).slice(0, 25);
            const aSnap = await db.collection("ads").doc("config").get();
            if(aSnap.exists) ads = aSnap.data().list;
            document.getElementById('step-start').classList.add('hidden');
            render();
        } catch(e) { alert("Error!"); }
    }

    function render() {
        updateAds();
        if (idx > 0 && idx % 3 === 0) return showForcedAd();

        document.getElementById('step-quiz').classList.remove('hidden');
        const q = qs[idx];
        document.getElementById('qText').innerText = q.text;
        
        let h = '';
        const l = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((o, i) => {
            h += `<button class="btn opt-btn" onclick="check('${String.fromCharCode(65+i)}')">
                    <div class="label">${l[i]}</div><span>${o}</span>
                  </button>`;
        });
        document.getElementById('options').innerHTML = h;
        startT();
    }

    function updateAds() {
        if(!ads.length) return;
        const r = ads[Math.floor(Math.random() * ads.length)];
        document.getElementById('ad-banner').innerHTML = `<img src="${r.img}" class="ad-banner-img">`;
        if(r.audio) { const a = document.getElementById('ad-audio'); a.src = r.audio; a.play().catch(()=>{}); }
    }

    function startT() {
        timeLeft = 20; clearInterval(timer);
        document.getElementById('timer').innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); check('X'); }
        }, 1000);
    }

    function check(a) {
        clearInterval(timer);
        if(a === qs[idx].correct) { score++; document.getElementById('pet').innerText = "🦁"; document.getElementById('snd-correct').play().catch(()=>{}); }
        else { document.getElementById('pet').innerText = "🐑"; document.getElementById('snd-wrong').play().catch(()=>{}); }
        setTimeout(() => { idx++; if(idx < qs.length) render(); else finish(); }, 600);
    }

    function showForcedAd() {
        document.getElementById('step-quiz').classList.add('hidden');
        const fAd = document.getElementById('forced-ad');
        fAd.style.display = 'flex';
        document.getElementById('close-ad').style.display = 'none';
        const r = ads[Math.floor(Math.random() * ads.length)];
        document.getElementById('ad-full-img').innerHTML = `<img src="${r.img}" style="width:100%; height:100%; object-fit:cover;">`;

        let w = 5;
        const i = setInterval(() => {
            w--; document.getElementById('wait-txt').innerText = `ለ ${w} ሰከንድ ይጠብቁ...`;
            if(w <= 0) { clearInterval(i); document.getElementById('wait-txt').innerText = "አልቋል!"; document.getElementById('close-ad').style.display = 'block'; }
        }, 1000);
    }

    function hideForcedAd() { document.getElementById('forced-ad').style.display = 'none'; render(); }

    function finish() {
        document.getElementById('step-quiz').classList.add('hidden');
        document.getElementById('ad-banner').style.display = 'none';
        document.getElementById('step-res').classList.remove('hidden');
        const p = Math.round((score/qs.length)*100);
        document.getElementById('score-pct').innerText = p + "%";
        if(p >= 90) document.getElementById('roll-btn-box').classList.remove('hidden');
    }

    function doRoll() { alert(Math.random() < 0.15 ? "አሸንፈዋል!" : "ዕድል የለም!"); }
</script>
</body>
</html>

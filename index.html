<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Quiz App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --white: #ffffff;
        }

        /* ሙሉ ስክሪን አቀማመጥ */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; flex-direction: column; /* በአቀባዊ ይደረደራል */
            background: linear-gradient(180deg, var(--sky-blue) 0%, #f0f8ff 100%);
            font-family: 'Nyala', 'Segoe UI', sans-serif;
            overflow: hidden; /* ዋናው ቦዲ እንዳይንቀሳቀስ */
        }

        /* 1. ቋሚ ሄደር (Fixed Top) */
        header {
            flex-shrink: 0; /* መጠኑ እንዳይቀንስ */
            background: var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .logo-box { height: 60px; display: flex; justify-content: center; align-items: center; }
        .logo-box h1 { color: var(--primary); font-size: 2.8em; font-weight: 900; margin: 0; }
        
        .ticker-box { background: var(--primary); color: white; padding: 5px 0; overflow: hidden; white-space: nowrap; font-size: 0.8em; }
        .ticker-box p { display: inline-block; animation: ticker 20s linear infinite; margin: 0; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 2. መሃል ክፍል (ጥያቄ - Scrollable) */
        main {
            flex: 1; /* የቀረውን ስክሪን በሙሉ ይይዛል */
            overflow-y: auto; /* ጥያቄው ከረዘመ ወደ ላይ እና ታች ማንሸራተት ይቻላል */
            -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 15px 100px 15px; /* ከታች ለማስታወቂያው ሰፊ ቦታ (100px) */
        }

        .quiz-card {
            background: var(--white); width: 100%; max-width: 400px;
            padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; box-sizing: border-box;
        }

        /* 3. ቋሚ ፉተር (Fixed Bottom Ad) */
        footer {
            flex-shrink: 0; height: 65px; background: white;
            border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: center;
            position: fixed; bottom: 0; width: 100%; z-index: 1000;
        }
        .ad-banner-img { height: 100%; width: auto; max-width: 100%; object-fit: contain; }

        /* UI Elements */
        #timer-box { width: 50px; height: 50px; border: 3px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: bold; color: #e74c3c; font-size: 1.3em; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 1.1em; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .opt-btn { background: #fdfdfd; color: #333; text-align: left; border: 2px solid #eee; display: flex; align-items: center; }
        .label { background: var(--primary); color: white; min-width: 32px; height: 32px; border-radius: 7px; margin-right: 15px; display: flex; align-items: center; justify-content: center; }

        /* Forced Ad Screen */
        #forced-ad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1.1em; }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>
    <audio id="ad-audio" loop></audio>

    <header>
        <div class="logo-box"><h1>ቃል</h1></div>
        <div class="ticker-box"><p>🌟 እንኳን ደስ አለዎት! አዳዲስ አሸናፊዎች በዕጣ እየተመረጡ ነው። • ጓደኞችዎን ይጋብዙ! • ቃሉን ይፈትኑ ይሸለሙ! 🌟</p></div>
    </header>

    <div id="forced-ad">
        <h2 style="color:var(--primary);">ማስታወቂያ</h2>
        <div id="ad-full-view" style="width:300px; height:300px; background:#f5f5f5; border-radius:20px; overflow:hidden; margin:20px 0;"></div>
        <p id="wait-msg">ለ 5 ሰከንድ ይጠብቁ...</p>
        <button id="close-f-ad" class="btn" style="width:200px; display:none;" onclick="hideForced()">ቀጥል ➔</button>
    </div>

    <main>
        <div class="quiz-card" id="q-card">
            <div id="pet" style="font-size: 50px; margin-bottom: 10px;">🐑</div>

            <div id="scr-start">
                <input type="text" id="uName" placeholder="ሙሉ ስም">
                <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
                <button class="btn" onclick="startApp()">ጀምር ➔</button>
            </div>

            <div id="scr-quiz" class="hidden">
                <div id="timer-box">20</div>
                <p id="qText" style="font-weight:bold; font-size:1.2em; min-height:60px; line-height:1.4;"></p>
                <div id="opts-box"></div>
            </div>

            <div id="scr-res" class="hidden">
                <h2 style="color:var(--primary);">ውጤት</h2>
                <h1 id="res-pct" style="color:var(--accent); font-size:4.5em; margin:10px 0;">0%</h1>
                <div id="roll-section" class="hidden">
                    <p style="font-weight:bold;">ድንቅ ነው! ዕጣዎን ይሞክሩ</p>
                    <div style="font-size:80px; cursor:pointer;" onclick="startRoll()">🎁</div>
                </div>
                <button class="btn" onclick="location.reload()" style="background:#888;">እንደገና ተጫወት</button>
            </div>
        </div>
    </main>

    <footer>
        <div id="ad-banner-box" style="width:100%; height:100%; display:flex; justify-content:center;">
            <p style="color:#ccc; font-size:0.7em; align-self:center;">Ad Banner</p>
        </div>
    </footer>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", authDomain: "biblicallanguagequizbot.firebaseapp.com", projectId: "biblicallanguagequizbot", storageBucket: "biblicallanguagequizbot.firebasestorage.app", messagingSenderId: "1040255793336", appId: "1:1040255793336:web:83444c54330769d257dc4d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], ads = [], qIdx = 0, score = 0, timer, tLeft = 20;

    window.onload = () => {
        if(localStorage.getItem('un')) document.getElementById('uName').value = localStorage.getItem('un');
        if(localStorage.getItem('up')) document.getElementById('uPhone').value = localStorage.getItem('up');
    };

    async function startApp() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
        if(!n || !p) return alert("ስም እና ስልክ ያስገቡ!");
        localStorage.setItem('un', n); localStorage.setItem('up', p);

        try {
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(d => qPool.push(d.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 25);
            
            const aSnap = await db.collection("ads").doc("config").get();
            if(aSnap.exists) ads = aSnap.data().list;

            document.getElementById('scr-start').classList.add('hidden');
            renderQ();
        } catch(e) { alert("መረጃ መጫን አልተቻለም!"); }
    }

    function renderQ() {
        updateBanner();
        if (qIdx > 0 && qIdx % 3 === 0) return showForced();

        document.getElementById('scr-quiz').classList.remove('hidden');
        const q = qPool[qIdx];
        document.getElementById('qText').innerText = q.text;
        
        let h = '';
        const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            h += `<button class="btn opt-btn" onclick="checkAns('${String.fromCharCode(65+i)}')">
                    <div class="label">${labels[i]}</div><span>${opt}</span>
                  </button>`;
        });
        document.getElementById('opts-box').innerHTML = h;
        startTimer();
    }

    function updateBanner() {
        if(!ads.length) return;
        const r = ads[Math.floor(Math.random() * ads.length)];
        document.getElementById('ad-banner-box').innerHTML = `<img src="${r.img}" class="ad-banner-img">`;
        if(r.audio) { const a = document.getElementById('ad-audio'); a.src = r.audio; a.play().catch(()=>{}); }
    }

    function startTimer() {
        tLeft = 20; clearInterval(timer);
        document.getElementById('timer-box').innerText = tLeft;
        timer = setInterval(() => {
            tLeft--; document.getElementById('timer-box').innerText = tLeft;
            if(tLeft <= 0) { clearInterval(timer); checkAns('TIMEOUT'); }
        }, 1000);
    }

    function checkAns(a) {
        clearInterval(timer);
        if(a === qPool[qIdx].correct) { score++; document.getElementById('pet').innerText = "🦁"; document.getElementById('snd-correct').play().catch(()=>{}); }
        else { document.getElementById('pet').innerText = "🐑"; document.getElementById('snd-wrong').play().catch(()=>{}); }
        
        setTimeout(() => {
            qIdx++;
            if(qIdx < qPool.length) renderQ(); else showFinal();
        }, 600);
    }

    function showForced() {
        document.getElementById('scr-quiz').classList.add('hidden');
        const overlay = document.getElementById('forced-ad');
        overlay.style.display = 'flex';
        document.getElementById('close-f-ad').style.display = 'none';
        const r = ads[Math.floor(Math.random() * ads.length)];
        document.getElementById('ad-full-view').innerHTML = `<img src="${r.img}" style="width:100%; height:100%; object-fit:cover;">`;

        let w = 5;
        const i = setInterval(() => {
            w--; document.getElementById('wait-msg').innerText = `ለ ${w} ሰከንድ ይጠብቁ...`;
            if(w <= 0) { clearInterval(i); document.getElementById('wait-msg').innerText = "አልቋል!"; document.getElementById('close-f-ad').style.display = 'block'; }
        }, 1000);
    }

    function hideForced() { document.getElementById('forced-ad').style.display = 'none'; renderQ(); }

    function showFinal() {
        document.getElementById('scr-quiz').classList.add('hidden');
        document.getElementById('ad-banner-box').style.display = 'none';
        document.getElementById('scr-res').classList.remove('hidden');
        const p = Math.round((score/qPool.length)*100);
        document.getElementById('res-pct').innerText = p + "%";
        if(p >= 90) document.getElementById('roll-section').classList.remove('hidden');
    }

    function startRoll() { alert(Math.random() < 0.15 ? "እንኳን ደስ አለዎት! አሸንፈዋል!" : "ዕድል አልቀናዎትም!"); }
</script>
</body>
</html>

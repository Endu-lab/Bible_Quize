<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቃል (Qal) - Bible Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #1a2a6c; 
            --accent: #f39c12; 
            --sky-blue: #87CEEB; 
            --white: #ffffff;
            --ad-bg: #f9f9f9;
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #f0f8ff 100%);
            font-family: 'Nyala', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* 1. Header (Logo & Ticker) */
        header {
            flex-shrink: 0; background: var(--white);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .logo-box { height: 65px; display: flex; justify-content: center; align-items: center; }
        .logo-box h1 { color: var(--primary); font-size: 3.2em; font-weight: 900; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .ticker-box { background: var(--primary); color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; font-size: 0.9em; }
        .ticker-box p { display: inline-block; animation: ticker 25s linear infinite; margin: 0; font-weight: bold; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 2. Scrollable Quiz Area */
        main {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 15px 110px 15px; /* Added extra padding for the ad */
        }

        .quiz-card {
            background: var(--white); width: 100%; max-width: 420px;
            padding: 25px; border-radius: 30px; 
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
            text-align: center; box-sizing: border-box;
        }

        /* 3. SMART AD FOOTER (The Income Generator) */
        footer {
            flex-shrink: 0; height: 85px; /* Slightly taller for better visibility */
            background: var(--white);
            border-top: 3px solid var(--primary); 
            display: flex; align-items: center; justify-content: center;
            position: fixed; bottom: 0; width: 100%; z-index: 2000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        .ad-container {
            width: 100%; height: 100%; position: relative;
            display: flex; align-items: center; justify-content: center;
            background: var(--ad-bg);
        }
        .ad-banner-img { height: 100%; width: auto; max-width: 100%; object-fit: contain; cursor: pointer; transition: 0.3s; }
        .ad-banner-img:hover { transform: scale(1.02); }
        .ad-tag { position: absolute; top: 2px; right: 5px; font-size: 0.6em; color: #bbb; pointer-events: none; }

        /* Timer & Buttons */
        #timer-box { width: 55px; height: 55px; border: 4px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: 900; color: #e74c3c; font-size: 1.4em; background: #fff5f5; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 1.15em; transition: 0.3s; box-shadow: 0 4px 10px rgba(26, 42, 108, 0.2); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .opt-btn { background: #ffffff; color: #333; text-align: left; border: 2px solid #f0f0f0; display: flex; align-items: center; }
        .opt-btn:hover { border-color: var(--sky-blue); background: #fafdff; }
        .label { background: var(--primary); color: white; min-width: 35px; height: 35px; border-radius: 8px; margin-right: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .hidden { display: none; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; font-size: 1.1em; outline: none; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <audio id="snd-correct" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/correct.mp3"></audio>
    <audio id="snd-wrong" src="https://raw.githubusercontent.com/Endu-lab/Bible_Quize/main/assets/sounds/wrong.mp3"></audio>
    <audio id="ad-audio" loop></audio>

    <header>
        <div class="logo-box"><h1>ቃል</h1></div>
        <div class="ticker-box"><p>🌟 ቃሉን ይፈትኑ፣ እውቀትዎን ያሳድጉ እና ድንቅ ሽልማቶችን ያሸንፉ! • ጓደኞችዎን ይጋብዙ እና ተጨማሪ ዕድል ያግኙ! 🌟</p></div>
    </header>

    <main>
        <div class="quiz-card" id="q-card">
            <div id="pet" style="font-size: 55px; margin-bottom: 12px;">🐑</div>

            <div id="scr-start">
                <h3 style="color:var(--primary); margin-top:0;">እንኳን ደህና መጡ</h3>
                <input type="text" id="uName" placeholder="ሙሉ ስም">
                <input type="tel" id="uPhone" placeholder="ስልክ ቁጥር">
                <button class="btn" onclick="startApp()">መፈተን ጀምር ➔</button>
            </div>

            <div id="scr-quiz" class="hidden">
                <div id="timer-box">20</div>
                <p id="qText" style="font-weight:bold; font-size:1.25em; min-height:70px; line-height:1.5; color:#2c3e50;"></p>
                <div id="opts-box"></div>
            </div>

            <div id="scr-res" class="hidden">
                <h2 style="color:var(--primary);">የፈተና ውጤት</h2>
                <h1 id="res-pct" style="color:var(--accent); font-size:5em; margin:15px 0;">0%</h1>
                <div id="roll-section" class="hidden">
                    <p style="font-weight:bold; font-size:1.1em;">ድንቅ ውጤት! ዕጣዎን ይሞክሩ</p>
                    <div style="font-size:90px; cursor:pointer; animation: bounce 2s infinite;" onclick="startRoll()">🎁</div>
                </div>
                <button class="btn" onclick="location.reload()" style="background:#888;">እንደገና ተጫወት</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="ad-container" id="ad-banner-box">
            <span class="ad-tag">AD</span>
            <p style="color:#aaa; font-size:0.8em;">Loading Advertisement...</p>
        </div>
    </footer>

<script>
    // Firebase Configuration
    const firebaseConfig = { apiKey: "AIzaSyCLiqB5FqygKqPwLlctFsvQBP58fHontnc", authDomain: "biblicallanguagequizbot.firebaseapp.com", projectId: "biblicallanguagequizbot", storageBucket: "biblicallanguagequizbot.firebasestorage.app", messagingSenderId: "1040255793336", appId: "1:1040255793336:web:83444c54330769d257dc4d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let qPool = [], ads = [], qIdx = 0, score = 0, timer, tLeft = 20;

    // Load User
    window.onload = () => {
        if(localStorage.getItem('un')) document.getElementById('uName').value = localStorage.getItem('un');
        if(localStorage.getItem('up')) document.getElementById('uPhone').value = localStorage.getItem('up');
    };

    async function startApp() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
        if(!n || !p) return alert("እባክዎ መረጃዎን በትክክል ያስገቡ!");
        localStorage.setItem('un', n); localStorage.setItem('up', p);

        try {
            // Load Questions & Ads
            const qSnap = await db.collection("questions").get();
            qSnap.forEach(d => qPool.push(d.data()));
            qPool = qPool.sort(() => 0.5 - Math.random()).slice(0, 25);
            
            const aSnap = await db.collection("ads").doc("config").get();
            if(aSnap.exists) ads = aSnap.data().list;

            document.getElementById('scr-start').classList.add('hidden');
            renderQ();
        } catch(e) { alert("መረጃ መጫን አልተቻለም! እባክዎ ኢንተርኔትዎን ያረጋግጡ።"); }
    }

    function renderQ() {
        updateBanner(); // Income focus: Update ad every question
        document.getElementById('scr-quiz').classList.remove('hidden');
        const q = qPool[qIdx];
        document.getElementById('qText').innerText = q.text;
        
        let h = '';
        const labels = ["ሀ", "ለ", "ሐ", "መ"];
        q.options.forEach((opt, i) => {
            h += `<button class="btn opt-btn" onclick="checkAns('${String.fromCharCode(65+i)}')">
                    <div class="label">${labels[i]}</div><span>${opt}</span>
                  </button>`;
        });
        document.getElementById('opts-box').innerHTML = h;
        startTimer();
    }

    function updateBanner() {
        if(!ads || ads.length === 0) return;
        const r = ads[Math.floor(Math.random() * ads.length)];
        const box = document.getElementById('ad-banner-box');
        
        // Update Image
        box.innerHTML = `<span class="ad-tag">AD</span><img src="${r.img}" class="ad-banner-img" onclick="window.open('${r.link || '#'}', '_blank')">`;
        
        // Update Audio
        if(r.audio) {
            const a = document.getElementById('ad-audio');
            a.src = r.audio;
            a.play().catch(()=>{}); 
        }
    }

    function startTimer() {
        tLeft = 20; clearInterval(timer);
        document.getElementById('timer-box').innerText = tLeft;
        timer = setInterval(() => {
            tLeft--; document.getElementById('timer-box').innerText = tLeft;
            if(tLeft <= 0) { clearInterval(timer); checkAns('TIMEOUT'); }
        }, 1000);
    }

    function checkAns(a) {
        clearInterval(timer);
        const correct = qPool[qIdx].correct;
        const pet = document.getElementById('pet');

        if(a === correct) {
            score++;
            pet.innerText = "🦁";
            document.getElementById('snd-correct').play().catch(()=>{});
        } else {
            pet.innerText = "🐑";
            document.getElementById('snd-wrong').play().catch(()=>{});
        }
        
        setTimeout(() => {
            qIdx++;
            if(qIdx < qPool.length) renderQ(); else showFinal();
        }, 700);
    }

    function showFinal() {
        document.getElementById('scr-quiz').classList.add('hidden');
        document.getElementById('scr-res').classList.remove('hidden');
        const p = Math.round((score/qPool.length)*100);
        document.getElementById('res-pct').innerText = p + "%";
        if(p >= 90) document.getElementById('roll-section').classList.remove('hidden');
    }

    function startRoll() {
        const win = Math.random() < 0.15;
        alert(win ? "እንኳን ደስ አለዎት! የሞባይል ካርድ እጣ ደርሶዎታል።" : "ለዛሬ ዕድል የለም! በሚቀጥለው ይሞክሩ።");
    }
</script>

<style>
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
</style>

</body>
</html>
